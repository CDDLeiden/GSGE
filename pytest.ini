[pytest]
testpaths = GSGE/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --cov=GSGE
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-config=.coveragerc
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests requiring full setup
    unit: fast unit tests
    gae: GAE-related tests
    vocab: vocabulary tests
    tokenization: tokenization tests
    compound_graph: compound graph tests
